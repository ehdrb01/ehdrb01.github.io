<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Donggyu Kim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text:    #1c1c1c;
      --sub:     #4a4a4a;
      --muted:   #767676;
      --faint:   #a8a8a8;
      --rule:    #e6e6e6;
      --accent:  #2a5885;
      --bg:      #ffffff;
      --serif:   'EB Garamond', Georgia, serif;
      --sans:    'DM Sans', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Nav ── */
    nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--rule);
    }
    .nav-inner {
      max-width: 820px; margin: 0 auto; padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 50px;
    }
    .nav-name { font-family: var(--serif); font-size: 16px; color: var(--text); }
    .nav-links { display: flex; gap: 1.8rem; list-style: none; }
    .nav-links a {
      font-size: 12.5px; letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color .18s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .page { max-width: 820px; margin: 0 auto; padding: 0 2rem; }

    /* ── Back link ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12.5px; letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--faint);
      padding-top: 2.5rem;
      padding-bottom: 0;
      transition: color .18s;
      text-decoration: none;
    }
    .back-link:hover { color: var(--accent); text-decoration: none; }
    .back-link svg { transition: transform .18s; }
    .back-link:hover svg { transform: translateX(-3px); }

    /* ── Post header ── */
    .post-header {
      padding: 2rem 0 2.2rem;
      border-bottom: 1px solid var(--rule);
      max-width: 680px;
    }
    .post-header h1 {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 3.8vw, 2.6rem);
      font-weight: 400; line-height: 1.2;
      margin-bottom: 1rem;
    }
    .post-header-meta {
      display: flex; align-items: center; gap: 1rem;
      flex-wrap: wrap;
    }
    .post-date { font-size: 13px; color: var(--faint); }
    .post-type-badge {
      font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 8px;
      border: 1px solid var(--rule); border-radius: 2px;
      color: var(--faint);
    }
    .post-tags-header { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 11px; padding: 2px 9px;
      border: 1px solid var(--rule); border-radius: 2px;
      color: var(--faint);
    }

    /* ── Post body ── */
    .post-body {
      padding: 2.8rem 0 5rem;
      max-width: 680px;
      font-size: 16.5px;
      line-height: 1.9;
      color: var(--sub);
    }

    .post-body h1, .post-body h2, .post-body h3, .post-body h4 {
      font-family: var(--serif);
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
    }
    .post-body h2 {
      font-size: 1.55rem;
      margin: 2.5rem 0 0.9rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--rule);
    }
    .post-body h3 {
      font-size: 1.25rem;
      margin: 2rem 0 0.7rem;
    }
    .post-body h4 {
      font-size: 1.05rem;
      margin: 1.6rem 0 0.5rem;
      color: var(--sub);
    }

    .post-body p { margin-bottom: 1.2rem; }

    .post-body a { color: var(--accent); border-bottom: 1px solid transparent; transition: border-color .15s; }
    .post-body a:hover { border-bottom-color: var(--accent); text-decoration: none; }

    .post-body ul, .post-body ol {
      padding-left: 1.5rem;
      margin-bottom: 1.2rem;
    }
    .post-body li { margin-bottom: 0.4rem; }

    .post-body code {
      background: #f4f4f2;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 14px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      color: #d44;
    }
    .post-body pre {
      background: #f8f8f6;
      border: 1px solid var(--rule);
      border-left: 3px solid var(--accent);
      padding: 1.3rem 1.5rem;
      border-radius: 0 4px 4px 0;
      overflow-x: auto;
      margin: 1.5rem 0;
      line-height: 1.65;
    }
    .post-body pre code {
      background: none;
      padding: 0;
      font-size: 13.5px;
      color: var(--sub);
      border-radius: 0;
    }

    .post-body blockquote {
      margin: 1.5rem 0;
      padding: 0.5rem 1.2rem;
      border-left: 2px solid var(--accent);
      color: var(--muted);
      font-family: var(--serif);
      font-style: italic;
      font-size: 17.5px;
      line-height: 1.7;
    }
    .post-body blockquote p { margin-bottom: 0; }

    .post-body img {
      max-width: 100%;
      border-radius: 4px;
      margin: 1.5rem 0;
      border: 1px solid var(--rule);
    }

    .post-body hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2.5rem 0;
    }

    .post-body table {
      width: 100%; border-collapse: collapse;
      font-size: 14.5px; margin: 1.5rem 0;
    }
    .post-body th {
      font-weight: 500; font-size: 12px;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--faint);
      border-bottom: 1px solid var(--rule);
      padding: 0.5rem 0.8rem; text-align: left;
    }
    .post-body td {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid var(--rule);
      color: var(--sub);
    }
    .post-body tr:last-child td { border-bottom: none; }

    /* ── Loading / error state ── */
    .post-state {
      padding: 5rem 0;
      font-family: var(--serif);
      font-style: italic;
      font-size: 18px;
      color: var(--faint);
    }

    /* ── Footer ── */
    footer {
      padding: 2.2rem 0;
      border-top: 1px solid var(--rule);
      font-size: 12.5px; color: var(--faint);
    }
    footer .page { display: flex; justify-content: space-between; align-items: center; }

    @media (max-width: 580px) {
      .post-header, .post-body { max-width: 100%; }
      footer .page { flex-direction: column; gap: 4px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-name" style="text-decoration:none;">Donggyu Kim</a>
    <ul class="nav-links">
      <li><a href="index.html#education">Education</a></li>
      <li><a href="index.html#publications">Publications</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </div>
</nav>

<div class="page">

  <a href="blog.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 2L4 7l5 5"/>
    </svg>
    Back to Blog
  </a>

  <div class="post-header" id="postHeader">
    <h1 id="postTitle" class="post-state">Loading…</h1>
  </div>

  <div class="post-body" id="postBody"></div>

</div>

<footer>
  <div class="page">
    <span>© 2025 Donggyu Kim. All rights reserved.</span>
    <span>Hosted on GitHub Pages</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const file   = params.get("file");

  if (!file) {
    document.getElementById("postTitle").textContent = "No post specified.";
  } else {
    fetch(file)
      .then(r => {
        if (!r.ok) throw new Error("not found");
        return r.text();
      })
      .then(md => {
        /* ── frontmatter 파싱 ── */
        const fmMatch = md.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n/);
        let title = file, date = "", type = "", tags = [], body = md;

        if (fmMatch) {
          const fm = fmMatch[1];
          title = (fm.match(/title:\s*(.+)/)  || [])[1]?.trim() || title;
          date  = (fm.match(/date:\s*(.+)/)   || [])[1]?.trim() || "";
          type  = (fm.match(/type:\s*(.+)/)   || [])[1]?.trim() || "";
          const tagsLine = (fm.match(/tags:\s*\[(.+)\]/) || [])[1] || "";
          tags  = tagsLine ? tagsLine.split(",").map(t => t.trim().replace(/['"]/g, "")) : [];
          body  = md.slice(fmMatch[0].length);
        }

        /* ── <head> title ── */
        document.title = title + " — Donggyu Kim";

        /* ── header ── */
        const header = document.getElementById("postHeader");
        header.innerHTML = `
          <h1 id="postTitle">${title}</h1>
          <div class="post-header-meta">
            ${date ? `<span class="post-date">${date}</span>` : ""}
            ${type ? `<span class="post-type-badge">${type}</span>` : ""}
            ${tags.length ? `
              <div class="post-tags-header">
                ${tags.map(t => `<span class="tag">${t}</span>`).join("")}
              </div>` : ""}
          </div>`;

        /* ── body ── */
        document.getElementById("postBody").innerHTML = marked.parse(body);
      })
      .catch(() => {
        document.getElementById("postTitle").textContent = "포스트를 불러올 수 없습니다.";
        document.getElementById("postTitle").style.color = "var(--faint)";
      });
  }
</script>

</body>
</html>
